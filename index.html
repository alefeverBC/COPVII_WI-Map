    function polygonCentroid(ring) {
      var area=0,cx=0,cy=0,n=ring.length;
      for(var i=0,j=n-1;i<n;j=i++){var xi=ring[i][0],yi=ring[i][1],xj=ring[j][0],yj=ring[j][1],a=xi*yj-xj*yi;area+=a;cx+=(xi+xj)*a;cy+=(yi+yj)*a;}
      area/=2;
      if(Math.abs(area)<1e-12){var x0=Infinity,x1=-Infinity,y0=Infinity,y1=-Infinity;ring.forEach(function(c){x0=Math.min(x0,c[0]);x1=Math.max(x1,c[0]);y0=Math.min(y0,c[1]);y1=Math.max(y1,c[1]);});return[(x0+x1)/2,(y0+y1)/2];}
      return[cx/(6*area),cy/(6*area)];
    }
    function featureCentroid(f) {
      var g=f.geometry;
      if(g.type==='Polygon') return polygonCentroid(g.coordinates[0]);
      if(g.type==='MultiPolygon'){var bA=-Infinity,bR=null;g.coordinates.forEach(function(p){var r=p[0],a=0,n=r.length;for(var i=0,j=n-1;i<n;j=i++)a+=(r[j][0]+r[i][0])*(r[j][1]-r[i][1]);a=Math.abs(a)/2;if(a>bA){bA=a;bR=r;}});return polygonCentroid(bR);}
      return null;
    }
    function updateLabels() {
      labelLayer.clearLayers();

        var c=featureCentroid(f);
        if(!c||!bounds.contains([c[1],c[0]])) return;
        L.marker([c[1],c[0]],{icon:L.divIcon({className:'',html:'<div style="width:140px;text-align:center;font-family:sans-serif;font-size:12px;color:#1a1a2e;font-weight:700;letter-spacing:0.03em;pointer-events:none;text-shadow:0 0 3px #f5f2ec,0 0 4px #f5f2ec,1px 1px 0 #f5f2ec,-1px -1px 0 #f5f2ec,1px -1px 0 #f5f2ec,-1px 1px 0 #f5f2ec">'+f.properties.name+'</div>',iconSize:[140,20],iconAnchor:[70,10]}),interactive:false}).addTo(labelLayer);

    }

}
function onEachFeature(feature, layer) {
  var p = feature.properties;

    '</table></div>',

}
geoLayer = L.geoJSON(geojsonData, { style:styleFeature, onEachFeature:onEachFeature }).addTo(map);
